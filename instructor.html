<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instructor Panel – CodeTrace</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .instructor-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-top: 1rem;
      }
      .analysis-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 0.8rem;
        margin-top: 1rem;
      }
      .analysis-table th {
        text-align: left;
        padding: 0 1rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.4);
      }
      .analysis-table td {
        padding: 1.2rem 1rem;
        background: rgba(255, 255, 255, 0.03);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        color: #fff;
        font-size: 0.9rem;
      }
      .analysis-table td:first-child {
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        border-top-left-radius: 16px;
        border-bottom-left-radius: 16px;
      }
      .analysis-table td:last-child {
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        border-top-right-radius: 16px;
        border-bottom-right-radius: 16px;
      }
      .similarity-badge {
        font-weight: 700;
        padding: 0.3rem 0.8rem;
        border-radius: 999px;
        font-size: 0.8rem;
      }
      .high-risk { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
      .med-risk { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
      .low-risk { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
      
      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="background" style="background-image: url('./image3.png'); background-size: cover; background-position: center;"></div>
    <div class="overlay"></div>

    <main class="dashboard">
      <header class="header-row" style="gap: 1rem">
        <div class="title-group">
          <img src="./lock.png" class="logo-img" alt="Logo" />
          <div class="title-text">
            <div class="codetrace-title">
              <div class="text-row">
                <span class="code">Code</span><span class="trace">Trace</span>
                <div class="reflection">CodeTrace</div>
              </div>
            </div>
          </div>
        </div>

        <div class="nav-actions">
          <a href="./main.html" class="btn btn-ghost" style="font-size: 0.8rem">Dashboard</a>
        </div>

        <!-- Profile Full-Page Overlay (Same as main.html) -->
        <div id="profileOverlay" class="profile-overlay" style="display: none;">
          <div class="overlay-container" style="width: min(600px, 92vw); padding: 3rem;">
            <button id="closeProfileBtn" class="close-overlay-btn">&times;</button>
            <div class="overlay-content">
              <div class="profile-header-large" style="gap: 2rem; margin-bottom: 2rem;">
                <div class="profile-avatar x-large" id="overlayAvatar" style="width: 80px; height: 80px; font-size: 2rem; border-radius: 24px;"></div>
                <div class="profile-details-large">
                  <h1 id="overlayName" style="font-size: 1.8rem;"></h1>
                  <p id="overlayEmail" style="font-size: 0.9rem;"></p>
                  <div id="overlayRole" class="role-badge-large" style="padding: 0.3rem 1rem; font-size: 0.7rem;"></div>
                </div>
              </div>
              <div class="overlay-grid" style="grid-template-columns: 1fr; gap: 2rem;">
                <div class="overlay-section">
                  <div class="section-header-row">
                    <h2 class="overlay-section-title">Scan History</h2>
                    <button class="btn btn-soft btn-sm" id="clearHistoryBtn" type="button">Clear</button>
                  </div>
                  <div id="scanHistory" class="overlay-history-list">
                    <span class="empty-msg">No past scans yet.</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <section class="dash-card" style="margin-top: 1.5rem">
        <div class="dash-card-inner">
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap">
            <div>
              <div class="pill"><span class="badge-dot"></span> Bulk Analysis</div>
              <h2 style="margin-top: 0.5rem; color: #fff; font-size: 1.2rem;">Cross-Check Student Submissions</h2>
              <p style="color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; margin-top: 0.2rem;">Analyze all stored code submissions to find matching logic and structural similarities.</p>
            </div>
            <div style="display: flex; gap: 0.8rem;">
              <button class="btn btn-soft" id="clearLibraryBtn">Clear Database</button>
              <button class="btn btn-primary" id="runBulkAnalysisBtn">Run Analysis</button>
            </div>
          </div>
        </div>
      </section>

      <div class="instructor-grid">
        <section class="dash-card">
          <div class="dash-card-inner">
            <h2 class="overlay-section-title">Analysis Results</h2>
            <div id="analysisContainer">
              <div class="empty-state">
                <p>No analysis run yet. Click "Run Analysis" to cross-check all submissions.</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const CURRENT_KEY = "cpc_currentUser";
      const LIB_KEY = "cpc_plagiarism_library";

      function safeJsonParse(raw, fallback) {
        try { return raw ? JSON.parse(raw) : fallback; } catch { return fallback; }
      }

      const user = safeJsonParse(localStorage.getItem(CURRENT_KEY), null);
      if (!user || user.role.toLowerCase() !== 'instructor') {
        window.location.replace("./main.html");
      }

      // Initialize UI
      const initial = (user.name || "U")[0].toUpperCase();
      const profileName = document.getElementById("profileName");
      const profileAvatar = document.getElementById("profileAvatar");
      const overlayName = document.getElementById("overlayName");
      const overlayEmail = document.getElementById("overlayEmail");
      const overlayRole = document.getElementById("overlayRole");
      const overlayAvatar = document.getElementById("overlayAvatar");
      
      if (profileName) profileName.textContent = user.name;
      if (profileAvatar) profileAvatar.textContent = initial;
      if (overlayName) overlayName.textContent = user.name;
      if (overlayEmail) overlayEmail.textContent = user.email || "No email provided";
      if (overlayRole) overlayRole.textContent = user.role;
      if (overlayAvatar) overlayAvatar.textContent = initial;

      // User-specific history key
      const USER_HISTORY_KEY = `cpc_history_${user ? user.username : 'guest'}`;

      function getLibrary() { return safeJsonParse(localStorage.getItem(LIB_KEY), []); }
      function getHistory() { return safeJsonParse(localStorage.getItem(USER_HISTORY_KEY), []); }
      function setHistory(items) { localStorage.setItem(USER_HISTORY_KEY, JSON.stringify(items)); }

      async function fetchLibraryFromBackend() {
        if (!user) return;
        try {
          const res = await fetch("http://localhost:5000/api/library");
          if (!res.ok) return;
          const items = await res.json();
          if (Array.isArray(items)) {
            localStorage.setItem(LIB_KEY, JSON.stringify(items));
          }
        } catch (err) {
          console.warn("Failed to load library from backend:", err);
        }
      }

      async function fetchScansFromBackend() {
        if (!user) return;
        try {
          const res = await fetch("http://localhost:5000/api/scans");
          if (!res.ok) return;
          const scans = await res.json();
          if (Array.isArray(scans)) {
            setHistory(scans.map((s) => ({ text: s.text, similarity: s.similarity, date: s.createdAt })));
          }
        } catch (err) {
          console.warn("Failed to load scans from backend:", err);
        }
      }

      async function fetchAnalysisFromBackend() {
        if (!user) {
          console.log("[ANALYSIS FETCH] No user logged in");
          return [];
        }
        try {
          const url = `http://localhost:5000/api/analysis?instructorId=${encodeURIComponent(user.id)}`;
          console.log("[ANALYSIS FETCH] Fetching from:", url);
          const res = await fetch(url);
          
          if (!res.ok) {
            console.warn("[ANALYSIS FETCH] Failed with status:", res.status);
            return [];
          }
          
          const results = await res.json();
          console.log(`[ANALYSIS FETCHED] Retrieved ${Array.isArray(results) ? results.length : 0} result(s)`, results);
          return Array.isArray(results) ? results : [];
        } catch (err) {
          console.warn("[ANALYSIS FETCH ERROR]", err.message, err);
          return [];
        }
      }

      (async () => {
        await Promise.all([fetchLibraryFromBackend(), fetchScansFromBackend()]);
        
        // On page load, check if there are any existing analysis results to display
        const existingAnalysis = await fetchAnalysisFromBackend();
        if (existingAnalysis && existingAnalysis.length > 0) {
          console.log(`[PAGE LOAD] Found ${existingAnalysis.length} existing analysis result(s)`);
          
          let html = `
            <table class="analysis-table">
              <thead>
                <tr>
                  <th>First User</th>
                  <th>Second User</th>
                  <th>Matching Percentage</th>
                  <th>Level</th>
                </tr>
              </thead>
              <tbody>
          `;

          existingAnalysis.forEach(res => {
            const riskClass = res.matchingPercentage > 70 ? 'high-risk' : res.matchingPercentage >= 40 ? 'med-risk' : 'low-risk';
            const levelColor = res.matchingPercentage > 70 ? '#ef4444' : res.matchingPercentage >= 40 ? '#f59e0b' : '#10b981';
            
            html += `
              <tr>
                <td>
                  <div style="font-weight: 700; color: #fff;">${escapeHtml(res.userA)}</div>
                  <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem;">${escapeHtml(res.submissionA)}</div>
                </td>
                <td>
                  <div style="font-weight: 700; color: #fff;">${escapeHtml(res.userB)}</div>
                  <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem;">${escapeHtml(res.submissionB)}</div>
                </td>
                <td>
                  <div style="display: flex; align-items: center; gap: 0.8rem;">
                    <span class="similarity-badge ${riskClass}">${res.matchingPercentage}%</span>
                  </div>
                </td>
                <td style="font-weight: 700; font-size: 0.85rem; color: ${levelColor}">${res.level}</td>
              </tr>
            `;
          });

          html += '</tbody></table>';
          document.getElementById("analysisContainer").innerHTML = html;
        }
      })();

      // Overlay toggle
      const profileOverlay = document.getElementById("profileOverlay");
      const closeProfileBtn = document.getElementById("closeProfileBtn");

      closeProfileBtn.addEventListener("click", () => profileOverlay.style.display = "none");
      profileOverlay.addEventListener("click", (e) => { if (e.target === profileOverlay) profileOverlay.style.display = "none"; });

      // --- Analysis Logic ---
      function normalizeText(text) {
        return (text || "")
          .replace(/\r\n/g, "\n")
          .toLowerCase()
          .replace(/[^\p{L}\p{N}\s]+/gu, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function words(text) {
        const t = normalizeText(text);
        return t ? t.split(" ") : [];
      }

      function shingles(text, size = 2) {
        const tokens = words(text);
        const set = new Set();
        for (let i = 0; i + size <= tokens.length; i++) {
          set.add(tokens.slice(i, i + size).join(" "));
        }
        return set;
      }

      function jaccard(a, b) {
        if (!a || !b || !a.size || !b.size) return 0;
        let inter = 0;
        for (const x of a) if (b.has(x)) inter++;
        const uni = a.size + b.size - inter;
        return uni ? inter / uni : 0;
      }

      // ============================================
      // MOSS (Measure of Software Similarity) Algorithm
      // Industry-standard for code plagiarism detection
      // More effective than simple shingles for code
      // ============================================
      function computeFingerprints(tokens) {
        const k = 2; // Window size for token n-grams (2-grams)
        const fingerprints = new Set();
        
        // Use 2-grams for reliable matching
        for (let i = 0; i + k <= tokens.length; i++) {
          // Create shingle from k sequential tokens
          const shingle = tokens.slice(i, i + k).join(" ");
          // Hash the shingle using simple string hash
          let hash = 0;
          for (let j = 0; j < shingle.length; j++) {
            hash = ((hash << 5) - hash + shingle.charCodeAt(j)) | 0;
          }
          fingerprints.add(hash);
        }

        // If too few tokens for 2-grams, use individual tokens as fallback
        if (fingerprints.size === 0) {
          for (const token of tokens) {
            let hash = 0;
            for (let j = 0; j < token.length; j++) {
              hash = ((hash << 5) - hash + token.charCodeAt(j)) | 0;
            }
            fingerprints.add(hash);
          }
        }

        return fingerprints;
      }

      function mossSimilarity(text1, text2) {
        const tokens1 = words(text1);
        const tokens2 = words(text2);
        
        if (tokens1.length === 0 || tokens2.length === 0) {
          return 0;
        }
        
        const fp1 = computeFingerprints(tokens1);
        const fp2 = computeFingerprints(tokens2);
        
        // Count matching fingerprints
        let matches = 0;
        for (const hash of fp1) {
          if (fp2.has(hash)) {
            matches++;
          }
        }
        
        // Similarity based on Jaccard index: intersection / union
        const union = new Set([...fp1, ...fp2]).size;
        return union > 0 ? matches / union : 0;
      }

      const runBtn = document.getElementById("runBulkAnalysisBtn");
      const clearLibBtn = document.getElementById("clearLibraryBtn");
      const container = document.getElementById("analysisContainer");

      clearLibBtn.addEventListener("click", async () => {
        if (!confirm("Are you sure you want to clear ALL student submissions from the database? This cannot be undone.")) return;
        try {
          const res = await fetch("http://localhost:5000/api/library", { method: "DELETE" });
          if (res.ok) {
            localStorage.setItem(LIB_KEY, "[]");
            container.innerHTML = '<div class="empty-state"><p>Database cleared successfully.</p></div>';
          }
        } catch (err) {
          alert("Failed to clear database: " + err.message);
        }
      });

      runBtn.addEventListener("click", async () => {
        try {
          runBtn.disabled = true;
          runBtn.textContent = "Checking for saved results...";
          console.log("[RUN ANALYSIS] Starting analysis check...");
          
          // First, check if we already have saved analysis results in the database
          const savedResults = await fetchAnalysisFromBackend();
          console.log("[RUN ANALYSIS] Saved results found:", savedResults.length);
          
          if (savedResults && savedResults.length > 0) {
            // Display the saved results
            console.log("[RUN ANALYSIS] Displaying saved results");
            runBtn.textContent = "Run Analysis";
            runBtn.disabled = false;
            
            let html = `
              <table class="analysis-table">
                <thead>
                  <tr>
                    <th>First User</th>
                    <th>Second User</th>
                    <th>Matching Percentage</th>
                    <th>Level</th>
                  </tr>
                </thead>
                <tbody>
            `;

            savedResults.forEach(res => {
              const riskClass = res.matchingPercentage > 70 ? 'high-risk' : res.matchingPercentage >= 40 ? 'med-risk' : 'low-risk';
              const levelColor = res.matchingPercentage > 70 ? '#ef4444' : res.matchingPercentage >= 40 ? '#f59e0b' : '#10b981';
              
              html += `
                <tr>
                  <td>
                    <div style="font-weight: 700; color: #fff;">${escapeHtml(res.userA)}</div>
                    <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem;">${escapeHtml(res.submissionA)}</div>
                  </td>
                  <td>
                    <div style="font-weight: 700; color: #fff;">${escapeHtml(res.userB)}</div>
                    <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem;">${escapeHtml(res.submissionB)}</div>
                  </td>
                  <td>
                    <div style="display: flex; align-items: center; gap: 0.8rem;">
                      <span class="similarity-badge ${riskClass}">${res.matchingPercentage}%</span>
                    </div>
                  </td>
                  <td style="font-weight: 700; font-size: 0.85rem; color: ${levelColor}">${res.level}</td>
                </tr>
              `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
            return;
          }
          
          // If no saved results, run new analysis
          console.log("[RUN ANALYSIS] No saved results, running new analysis...");
          runBtn.textContent = "Fetching Data...";
          
          // Force a fresh sync from the backend database
          await fetchLibraryFromBackend();

          const library = getLibrary().filter(item => item && item.text && typeof item.text === 'string' && item.text.trim().length > 10);
          console.log("[RUN ANALYSIS] Library length:", library.length, library);

          if (library.length < 2) {
            console.warn("[RUN ANALYSIS] Not enough submissions. Need at least 2, got:", library.length);
            container.innerHTML = `
              <div class="empty-state">
                <p>Not enough submissions found in the database to perform a cross-comparison.</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">Current valid submissions: ${library.length} (minimum 2 required)</p>
              </div>`;
            runBtn.textContent = "Run Analysis";
            runBtn.disabled = false;
            return;
          }

          runBtn.textContent = "Analyzing Patterns...";

          // Short delay to show the status change
          await new Promise(r => setTimeout(r, 400));

          const results = [];
          // Use MOSS algorithm for plagiarism detection
          console.log("[RUN ANALYSIS] Using MOSS algorithm for similarity detection");

          for (let i = 0; i < library.length; i++) {
            for (let j = i + 1; j < library.length; j++) {
              const sim = mossSimilarity(library[i].text, library[j].text);
              // Only include results with some similarity or include all if needed
              results.push({
                a: library[i].title,
                userA: library[i].userName || "Unknown Student",
                b: library[j].title,
                userB: library[j].userName || "Unknown Student",
                score: Math.round(sim * 100)
              });
            }
          }

          // Sort by highest similarity first
          results.sort((a, b) => b.score - a.score);
          console.log("[RUN ANALYSIS] Calculated results:", results.length, results);

          if (results.length === 0) {
            console.warn("[RUN ANALYSIS] No results calculated");
            container.innerHTML = '<div class="empty-state"><p>No similarity results could be calculated between the available submissions.</p></div>';
            runBtn.textContent = "Run Analysis";
            runBtn.disabled = false;
            return;
          }

          runBtn.textContent = "Saving Results...";

          // Save all results to the backend database
          let savedCount = 0;
          for (const res of results) {
            try {
              const response = await fetch("http://localhost:5000/api/analysis", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  instructorId: user.id,
                  userA: res.userA,
                  userB: res.userB,
                  submissionA: res.a,
                  submissionB: res.b,
                  matchingPercentage: res.score,
                  level: res.score > 70 ? 'High' : res.score >= 40 ? 'Medium' : 'Low'
                })
              });
              if (response.ok) {
                savedCount++;
                console.log("[RUN ANALYSIS] Saved result:", res.userA, "vs", res.userB);
              } else {
                console.warn("[RUN ANALYSIS] Failed to save result:", res.userA, "vs", res.userB, response.status);
              }
            } catch (err) {
              console.warn("[RUN ANALYSIS] Error saving to database:", err.message);
            }
          }
          
          console.log(`[RUN ANALYSIS] Saved ${savedCount}/${results.length} results to database`);

          let html = `
              <table class="analysis-table">
                <thead>
                  <tr>
                    <th>First User</th>
                    <th>Second User</th>
                    <th>Matching Percentage</th>
                    <th>Level</th>
                  </tr>
                </thead>
                <tbody>
            `;

            results.forEach(res => {
              const riskClass = res.score > 70 ? 'high-risk' : res.score >= 40 ? 'med-risk' : 'low-risk';
              const levelLabel = res.score > 70 ? 'High' : res.score >= 40 ? 'Medium' : 'Low';
              const levelColor = res.score > 70 ? '#ef4444' : res.score >= 40 ? '#f59e0b' : '#10b981';
              
              html += `
                <tr>
                  <td>
                    <div style="font-weight: 700; color: #fff;">${escapeHtml(res.userA)}</div>
                    <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem;">${escapeHtml(res.a)}</div>
                  </td>
                  <td>
                    <div style="font-weight: 700; color: #fff;">${escapeHtml(res.userB)}</div>
                    <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem;">${escapeHtml(res.b)}</div>
                  </td>
                  <td>
                    <div style="display: flex; align-items: center; gap: 0.8rem;">
                      <span class="similarity-badge ${riskClass}">${res.score}%</span>
                    </div>
                  </td>
                  <td style="font-weight: 700; font-size: 0.85rem; color: ${levelColor}">${levelLabel}</td>
                </tr>
              `;
            });

          html += '</tbody></table>';
          container.innerHTML = html;
        } catch (err) {
          console.error("[RUN ANALYSIS] Error:", err);
          container.innerHTML = `
            <div class="empty-state">
              <p style="color: #ef4444;">Analysis failed to execute.</p>
              <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">Error: ${err.message}</p>
              <p style="font-size: 0.75rem; margin-top: 0.3rem; opacity: 0.5;">Check browser console for details</p>
            </div>`;
        } finally {
          runBtn.disabled = false;
          runBtn.textContent = "Run Analysis";
        }
      });

      function escapeHtml(str) {
        return (str || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderHistory() {
        const history = getHistory();
        const scanHistoryEl = document.getElementById("scanHistory");
        if (!history.length) {
          scanHistoryEl.innerHTML = '<span class="empty-msg">No past scans yet.</span>';
          return;
        }
        scanHistoryEl.innerHTML = history.map((h, idx) => {
          const riskClass = h.similarity > 70 ? 'mark-hi' : h.similarity >= 40 ? 'mark-med' : 'mark-lo';
          return `<div class="history-item-mini" style="padding: 1rem;">
            <div style="flex: 1; overflow: hidden">
              <div style="font-size: 0.8rem; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">${h.text}</div>
              <div style="font-size: 0.65rem; color: rgba(245, 245, 245, 0.4); margin-top: 0.2rem">${new Date(h.date).toLocaleDateString()}</div>
            </div>
            <div class="pill ${riskClass}" style="font-weight: 700; min-width: 45px; font-size: 0.7rem; justify-content: center">${h.similarity}%</div>
          </div>`;
        }).join("");
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – CodeTrace</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background"></div>
    <div class="overlay"></div>

    <main class="forgot-password-wrapper">
      <header class="form-header">
        <div>
          <div class="codetrace-title">
            <div class="text-row">
              <span class="code">Code</span><span class="trace">Trace</span>
              <div class="reflection">CodeTrace</div>
            </div>
          </div>
          <p>Enter your account details and set a new password.</p>
        </div>
        <img src="./lock.png" class="logo-img" alt="Logo" />
      </header>

      <form>
        <div class="form-group">
          <label for="identifier">Email or Username</label>
          <input type="text" id="identifier" name="identifier" placeholder="you@example.com or alexj" required />
        </div>

        <div class="form-group">
          <label for="role">User type</label>
          <input type="text" id="role" name="role" placeholder="Student / Instructor" required />
        </div>

        <div class="form-group">
          <label for="newPassword">New password</label>
          <div class="input-with-icon">
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              class="with-trailing-icon"
              placeholder="Enter a new password"
              required
            />
            <button type="button" class="icon-btn" id="toggleNewPassword" aria-label="Toggle new password visibility">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M2 12s3.8-7 10-7 10 7 10 7-3.8 7-10 7S2 12 2 12Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmNewPassword">Confirm new password</label>
          <div class="input-with-icon">
            <input
              type="password"
              id="confirmNewPassword"
              name="confirmNewPassword"
              class="with-trailing-icon"
              placeholder="Re-enter new password"
              required
            />
            <button
              type="button"
              class="icon-btn"
              id="toggleConfirmNewPassword"
              aria-label="Toggle confirm new password visibility"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M2 12s3.8-7 10-7 10 7 10 7-3.8 7-10 7S2 12 2 12Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.8rem">
          Update password
        </button>

        <div id="error" class="error-text" role="alert" aria-live="polite" style="display: none"></div>

        <div class="form-footer">
          <a href="./login.html">Back to log in</a>
        </div>
      </form>
    </main>

    <!-- Custom Popup -->
    <div id="passwordPopup" class="popup-overlay" style="display: none;">
      <div class="popup-content">
        <div class="popup-icon">✓</div>
        <h2>Password Updated</h2>
        <p>Your password has been successfully updated. You can now log in with your new password.</p>
        <button class="btn btn-primary" id="popupOkBtn">OK</button>
      </div>
    </div>

    <style>
      .popup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(8px);
      }
      .popup-content {
        background: #111;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 2.5rem;
        border-radius: 24px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      .popup-icon {
        width: 60px;
        height: 60px;
        background: #2b7cff;
        color: white;
        font-size: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        margin: 0 auto 1.5rem;
      }
      .popup-content h2 { margin-bottom: 1rem; }
      .popup-content p { color: rgba(255,255,255,0.7); margin-bottom: 2rem; line-height: 1.6; }
    </style>

    <script>
      const USERS_KEY = "cpc_users";

      function getUsers() {
        try {
          const raw = localStorage.getItem(USERS_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function setUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
      }

      const newPasswordInput = document.getElementById("newPassword");
      const confirmNewPasswordInput = document.getElementById("confirmNewPassword");

      document.getElementById("toggleNewPassword").addEventListener("click", () => {
        newPasswordInput.type = newPasswordInput.type === "password" ? "text" : "password";
      });

      document.getElementById("toggleConfirmNewPassword").addEventListener("click", () => {
        confirmNewPasswordInput.type = confirmNewPasswordInput.type === "password" ? "text" : "password";
      });

      const form = document.querySelector("form");
      const errorEl = document.getElementById("error");
      function showError(message) {
        errorEl.textContent = message;
        errorEl.style.display = "block";
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorEl.style.display = "none";

        const identifier = document.getElementById("identifier").value.trim().toLowerCase();
        const role = document.getElementById("role").value.trim().toLowerCase();
        const newPassword = newPasswordInput.value;
        const confirmNewPassword = confirmNewPasswordInput.value;

        if (newPassword.length < 6) {
          showError("Password must be at least 6 characters.");
          return;
        }
        if (newPassword !== confirmNewPassword) {
          showError("Passwords do not match.");
          return;
        }

        const users = getUsers();
        const idx = users.findIndex((u) => {
          const email = (u.email || "").toLowerCase();
          const username = (u.username || "").toLowerCase();
          const userRole = (u.role || "").toLowerCase();
          const matchesId = identifier === email || identifier === username;
          const matchesRole = role === userRole;
          return matchesId && matchesRole;
        });

        if (idx === -1) {
          showError("Account not found. Please check your details.");
          return;
        }

        users[idx] = { ...users[idx], password: newPassword, updatedAt: new Date().toISOString() };
        setUsers(users);

        const popup = document.getElementById("passwordPopup");
        popup.style.display = "flex";

        document.getElementById("popupOkBtn").addEventListener("click", () => {
          window.location.href = "./login.html";
        });
      });
    </script>
  </body>
</html>
